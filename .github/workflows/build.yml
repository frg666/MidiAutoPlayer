name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore ./MidiAutoPlayer.csproj

      - name: Build Release
        run: dotnet publish ./MidiAutoPlayer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidiAutoPlayer-win-x64
          path: ./publish
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: MidiAutoPlayer-win-x64
          path: ./MidiAutoPlayer

      - name: Create ZIP
        run: |
          cd MidiAutoPlayer
          zip -r ../MidiAutoPlayer-${{ github.event.inputs.version }}-win-x64.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: MidiAutoPlayer-${{ github.event.inputs.version }}-win-x64.zip
          generate_release_notes: true
          name: ${{ github.event.inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
